<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikasi Absensi Siswa</title>
<style>
  /* Reset & Dasar agar Proporsional */
  * { box-sizing: border-box; }
  
  body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    color: white;
    text-align: center;
    margin-bottom: 20px;
    font-size: 1.6rem;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }

  /* Navigasi Menu */
  .menu {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 500px;
    margin-bottom: 20px;
  }

  .menu button {
    padding: 12px 5px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.9);
    font-weight: bold;
    color: #4b6cb7;
    transition: 0.2s;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    font-size: 0.9rem;
  }

  .menu button:active { transform: scale(0.95); }

  /* Kotak Utama */
  .box {
    background: white;
    padding: 20px;
    width: 100%;
    max-width: 500px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: slideUp 0.3s ease-out;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h3 { margin-top: 0; color: #333; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }

  /* Input Style */
  label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.85rem; color: #666; }
  input {
    width: 100%;
    padding: 12px;
    margin: 5px 0 15px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px; /* Mencegah zoom otomatis di iPhone */
  }

  /* Tombol Aksi */
  .btn-group { display: flex; gap: 10px; }
  .btn-hadir { background: #2ecc71; color: white; flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
  .btn-tidak { background: #e74c3c; color: white; flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
  
  .btn-search { width: 100%; background: #764ba2; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
  
  .btn-reset { 
    background: none; 
    color: #ffcccc; 
    border: 1px solid #ffcccc; 
    margin-top: 30px; 
    padding: 8px; 
    border-radius: 8px; 
    cursor: pointer;
    font-size: 0.8rem;
  }

  .hidden { display: none; }

  /* List Styling */
  .siswa-item {
    padding: 12px;
    border-bottom: 1px solid #f9f9f9;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .siswa-item:hover { background: #fcfcfc; }

  .status-badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: bold;
    text-transform: uppercase;
  }
  .hadir { color: #27ae60; background: #e8f8f0; }
  .tidak { color: #c0392b; background: #fdeaea; }

  #notif { text-align: center; color: #27ae60; font-weight: bold; font-size: 0.9rem; }
</style>
</head>
<body>

<h1>Absensi Siswa</h1>

<div class="menu">
  <button onclick="show('form')">📝 Input</button>
  <button onclick="show('list')">📅 Timeline</button>
  <button onclick="show('tanggalPage')">📊 Per Tanggal</button>
  <button onclick="show('siswaPage')">👤 Per Siswa</button>
</div>

<div id="form" class="box">
  <h3>Input Absensi</h3>
  <label>Nama Siswa</label>
  <input id="nama" type="text" placeholder="Masukkan nama...">
  <label>Tanggal (Hanya Angka)</label>
  <input id="tanggal" type="number" placeholder="Contoh: 4">
  <div class="btn-group">
    <button class="btn-hadir" onclick="kirim('hadir')">Hadir</button>
    <button class="btn-tidak" onclick="kirim('tidak')">Tidak</button>
  </div>
  <p id="notif"></p>
</div>

<div id="list" class="box hidden">
  <h3>Timeline Absensi</h3>
  <div id="siswaList"></div>
</div>

<div id="detail" class="box hidden">
  <button onclick="show('list')" style="padding: 5px 10px; margin-bottom: 10px;">← Kembali</button>
  <h3 id="namaDetail"></h3>
  <div id="isiDetail"></div>
</div>

<div id="tanggalPage" class="box hidden">
  <h3>Filter Tanggal</h3>
  <input id="filterTanggal" type="number" placeholder="Masukkan tanggal">
  <button class="btn-search" onclick="tampilTanggal()">Cari Data</button>
  <div id="hasilTanggal" style="margin-top: 15px;"></div>
</div>

<div id="siswaPage" class="box hidden">
  <h3>Filter Siswa</h3>
  <input id="filterSiswa" type="text" placeholder="Masukkan nama siswa">
  <button class="btn-search" onclick="tampilSiswa()">Cari Siswa</button>
  <div id="hasilSiswa" style="margin-top: 15px;"></div>
</div>

<button class="btn-reset" onclick="resetData()">⚠️ Reset Semua Data</button>

<script>
// Ambil data dari LocalStorage
let data = JSON.parse(localStorage.getItem("absen")) || {};

// Simpan data ke LocalStorage
function save() {
  localStorage.setItem("absen", JSON.stringify(data));
}

// Navigasi Halaman
function show(page) {
  ["form","list","detail","tanggalPage","siswaPage"].forEach(id => {
    document.getElementById(id).classList.add("hidden");
  });
  document.getElementById(page).classList.remove("hidden");
  if(page === "list") renderList();
}

// Fungsi Simpan Absen
function kirim(status) {
  let namaInput = document.getElementById("nama");
  let tglInput = document.getElementById("tanggal");
  let nama = namaInput.value.trim();
  let tanggal = tglInput.value.trim();

  if(!nama || !tanggal) return alert("Isi nama dan tanggal dulu!");

  if(!data[nama]) data[nama] = [];
  data[nama].push({tanggal, status});
  save();

  document.getElementById("notif").textContent = "✅ Tersimpan!";
  namaInput.value = ""; // Kosongkan form nama saja agar tanggal tetap jika ingin input banyak siswa
  setTimeout(() => { document.getElementById("notif").textContent = ""; }, 2000);
}

// Render Semua Histori
function renderList() {
  let container = document.getElementById("siswaList");
  container.innerHTML = "";
  let grouped = {};

  Object.keys(data).forEach(nama => {
    data[nama].forEach(d => {
      if (!grouped[d.tanggal]) grouped[d.tanggal] = [];
      grouped[d.tanggal].push({ nama, status: d.status });
    });
  });

  let sortedTgl = Object.keys(grouped).sort((a,b) => b - a);
  if(sortedTgl.length === 0) container.innerHTML = "<p style='color:#999'>Belum ada data.</p>";

  sortedTgl.forEach(tgl => {
    container.innerHTML += `<div style="background:#f4f4f4; padding:5px 10px; margin-top:15px; border-radius:5px; font-size:0.85rem"><b>Tanggal ${tgl}</b></div>`;
    grouped[tgl].forEach(item => {
      container.innerHTML += `
        <div class="siswa-item" onclick="showDetail('${item.nama}')">
          <span>${item.nama}</span>
          <span class="status-badge ${item.status}">${item.status}</span>
        </div>
      `;
    });
  });
}

// Lihat Detail per Nama
function showDetail(nama) {
  show("detail");
  let hadir = 0, tidak = 0;
  data[nama].forEach(d => { d.status === "hadir" ? hadir++ : tidak++; });

  document.getElementById("namaDetail").innerHTML = `${nama}<br><small style="color:#666; font-size:0.8rem">Total Hadir: ${hadir} | Tidak: ${tidak}</small>`;
  document.getElementById("isiDetail").innerHTML = data[nama].map(d => `
    <div class="siswa-item">
      <span>Tanggal ${d.tanggal}</span>
      <span class="status-badge ${d.status}">${d.status}</span>
    </div>
  `).join("");
}

// Filter per Tanggal
function tampilTanggal() {
  let tgl = document.getElementById("filterTanggal").value.trim();
  let container = document.getElementById("hasilTanggal");
  let found = false;
  let html = `<b>Data Tanggal ${tgl}:</b><br>`;

  Object.keys(data).forEach(nama => {
    data[nama].forEach(d => {
      if(d.tanggal === tgl) {
        found = true;
        html += `<div class="siswa-item">${nama} <span class="status-badge ${d.status}">${d.status}</span></div>`;
      }
    });
  });
  container.innerHTML = found ? html : "Tidak ada data di tanggal ini.";
}

// Filter per Siswa
function tampilSiswa() {
  let nama = document.getElementById("filterSiswa").value.trim();
  if(data[nama]) {
    showDetail(nama);
  } else {
    alert("Nama siswa tidak ditemukan!");
  }
}

// Fungsi Reset Total
function resetData() {
  if(confirm("Hapus seluruh data absensi secara permanen?")) {
    localStorage.removeItem("absen");
    location.reload();
  }
}
</script>

</body>
</html>
